<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Food Website</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <div class="logo">QuickEat</div>
    <nav>
        <a href="#">Home</a>
        <a href="#">Menu</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </nav>
</header>

<section class="hero">
    <div class="hero-text">
        <h1>Delicious Food Delivered</h1>
        <p>Fresh meals from the best restaurants.</p>
        <button>Order Now</button>
    </div>
</section>

<section class="menu">
    <h2>Popular Dishes</h2>

    <div class="cards">

        <div class="card">
            <img src="https://via.placeholder.com/200">
            <h3>Burger</h3>
            <p>$8.99</p>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/200">
            <h3>Pizza</h3>
            <p>$12.99</p>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/200">
            <h3>Pasta</h3>
            <p>$10.99</p>
        </div>

    </div>
</section>

<footer>
    <p>© 2026 Food Website</p>
</footer>

</body>
</html>
